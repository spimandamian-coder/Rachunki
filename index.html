<!-- SZKIELET STRONY -->
<div class="container" style="padding: 20px; font-family: sans-serif;">
    <h2>Moje Rachunki</h2>
    
    <!-- Górny pasek: Wybór miesiąca oraz dynamiczne podsumowanie -->
    <div style="margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; background: #f5f5f5; padding: 15px; border-radius: 8px;">
        <div>
            <label for="monthSelect" style="font-weight: bold;">Wybierz miesiąc: </label>
            <select id="monthSelect" style="padding: 8px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc;"></select>
        </div>
        
        <!-- TUTAJ POJAWI SIĘ PODSUMOWANIE -->
        <div id="summaryContainer" style="font-size: 16px; display: flex; gap: 20px; font-weight: bold;">
            <span style="color: #2e7d32;">Opłacone: <span id="totalPaid">0.00</span> zł</span>
            <span style="color: #c62828;">Do zapłaty: <span id="totalUnpaid">0.00</span> zł</span>
        </div>
        
        <div style="visibility: hidden; width: 100px;"></div>
    </div>

    <!-- Dodawanie nowego rachunku -->
    <div style="margin-bottom: 20px;">
        <input type="text" id="newBillName" placeholder="Nazwa nowego rachunku..." style="padding: 8px; font-size: 16px; width: 250px; border-radius: 4px; border: 1px solid #ccc;">
        <button onclick="window.addNewBill()" style="padding: 8px 15px; font-size: 16px; cursor: pointer; border-radius: 4px; background-color: #007bff; color: white; border: none;">Dodaj</button>
    </div>

    <!-- Miejsce na karty z rachunkami -->
    <div id="billsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;"></div>
</div>

<!-- SKRYPT FIREBASE -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ----------------------------------------------------
    // OBIEKT CONFIG Z FIREBASE:
    const firebaseConfig = {
        apiKey: "AIzaSyB4XJj7CMAfeLaWgSPAb-QOW7AmzCuOIjg",
        authDomain: "rachunki-realtime.firebaseapp.com",
        databaseURL: "https://rachunki-realtime-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rachunki-realtime",
        storageBucket: "rachunki-realtime.firebasestorage.app",
        messagingSenderId: "1024588826825",
        appId: "1:1024588826825:web:bcba5bb7172aaf9eafa518",
        measurementId: "G-FLVENSC5TG"
    };
    // ----------------------------------------------------

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const defaultBills = [
        "Internet Play", "Woda Tuwima", "Czynsz Tuwima", "Czynsz Armii",
        "Fundusz Remontowy", "Gaz Tuwima", "Gaz Armii", "Prad Tuwima",
        "Prad Armii", "Prad dzialka", "Treninigi", "Obiady"
    ];

    const months = [
        "Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec",
        "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"
    ];

    document.addEventListener("DOMContentLoaded", () => {
        const monthSelect = document.getElementById('monthSelect');
        const billsGrid = document.getElementById('billsGrid');
        const newBillNameInput = document.getElementById('newBillName');
        const totalPaidSpan = document.getElementById('totalPaid');
        const totalUnpaidSpan = document.getElementById('totalUnpaid');

        if (!monthSelect || !billsGrid || !newBillNameInput || !totalPaidSpan || !totalUnpaidSpan) {
            console.error("Błąd: Nie znaleziono wymaganych elementów HTML na stronie!");
            return;
        }

        const currentYear = new Date().getFullYear();
        const yearsToGenerate = [currentYear - 1, currentYear, currentYear + 1];

        yearsToGenerate.forEach(year => {
            months.forEach((month, index) => {
                let option = document.createElement('option');
                option.value = `${year}-${index}`;
                option.textContent = `${month} ${year}`;
                monthSelect.appendChild(option);
            });
        });
        monthSelect.value = `${currentYear}-${new Date().getMonth()}`;

        let globalRegisteredBills = [];
        let currentMonthData = {};

        function createBillId(name) {
            return encodeURIComponent(name.toLowerCase().trim().replace(/\s+/g, '_'));
        }

        // 1. Słuchaj zmian na liście nazw rachunków
        const billsListRef = ref(db, 'registered_bills');
        onValue(billsListRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                globalRegisteredBills = data;
            } else {
                globalRegisteredBills = defaultBills;
                set(billsListRef, defaultBills);
            }
            rebuildGridStructure(); 
        });

        // 2. Słuchaj zmian dla wybranego miasta / miesiąca
        function listenToMonthData() {
            const monthDataRef = ref(db, `months_data/${monthSelect.value}`);
            onValue(monthDataRef, (snapshot) => {
                currentMonthData = snapshot.val() || {};
                rebuildGridStructure(); // Odbudowujemy strukturę, aby ukryć/pokazać usunięte karty
            });
        }

        // Budowanie struktury kart
        function rebuildGridStructure() {
            billsGrid.innerHTML = '';
            
            globalRegisteredBills.forEach((name, index) => {
                const billId = createBillId(name);
                const billData = currentMonthData[billId] || { amount: '', paid: false };
                
                // NOWOŚĆ: Jeśli status to 'removed', ignorujemy ten rachunek w tym konkretnym miesiącu
                if (billData.status === 'removed') {
                    return; 
                }
                
                const card = document.createElement('div');
                card.className = `bill-card`;
                card.id = `card-${billId}`;
                card.style.border = "1px solid #ccc";
                card.style.padding = "15px";
                card.style.borderRadius = "8px";
                card.style.position = "relative";
                card.style.transition = "background-color 0.3s ease";

                card.innerHTML = `
                    <button class="delete-btn" style="position: absolute; top: 5px; right: 10px; background: none; border: none; font-size: 20px; cursor: pointer; color: red;">×</button>
                    <div class="input-group" style="margin-bottom: 15px;">
                        <label style="display:block; margin-bottom:5px;">Nazwa opłaty:</label>
                        <input type="text" class="name-input" value="${name}" style="font-weight: bold; font-size: 16px; border: none; background: transparent; padding: 0; border-bottom: 1px dashed #ccc; border-radius: 0; width: 100%;">
                    </div>
                    <div class="input-group" style="margin-bottom: 10px;">
                        <label style="display:block; margin-bottom:5px;">Kwota (zł):</label>
                        <input type="number" step="0.01" class="amount-input" placeholder="0.00" style="padding: 5px; width: 90%;">
                    </div>
                    <label class="checkbox-group" style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="checkbox" class="paid-checkbox">
                        Opłacone
                    </label>
                `;

                card.querySelector('.delete-btn').addEventListener('click', () => removeBillFromCurrentMonth(name));
                card.querySelector('.amount-input').addEventListener('input', (e) => updateAmount(billId, e.target.value));
                card.querySelector('.paid-checkbox').addEventListener('change', (e) => togglePaid(billId, e.target.checked));
                card.querySelector('.name-input').addEventListener('change', (e) => updateBillName(index, name, e.target.value));

                billsGrid.appendChild(card);
            });
            
            updateLiveValues();
        }

        // Przeliczanie sum podsumowania
        function calculateTotals() {
            let paidSum = 0;
            let unpaidSum = 0;

            globalRegisteredBills.forEach(name => {
                const billId = createBillId(name);
                const billData = currentMonthData[billId] || { amount: 0, paid: false };
                
                // Nie wliczamy do sumy rachunków oznaczonych jako usunięte w danym miesiącu
                if (billData.status === 'removed') return;

                const amount = parseFloat(billData.amount) || 0;

                if (billData.paid) {
                    paidSum += amount;
                } else {
                    unpaidSum += amount;
                }
            });

            totalPaidSpan.textContent = paidSum.toFixed(2);
            totalUnpaidSpan.textContent = unpaidSum.toFixed(2);
        }

        // Aktualizacja wartości "w locie"
        function updateLiveValues() {
            globalRegisteredBills.forEach(name => {
                const billId = createBillId(name);
                const billData = currentMonthData[billId] || { amount: '', paid: false };
                
                if (billData.status === 'removed') return;

                const card = document.getElementById(`card-${billId}`);
                if (!card) return;

                const nameInput = card.querySelector('.name-input');
                const amountInput = card.querySelector('.amount-input');
                const paidCheckbox = card.querySelector('.paid-checkbox');

                if (document.activeElement !== nameInput && nameInput) {
                    nameInput.value = name;
                }

                if (document.activeElement !== amountInput && amountInput) {
                    amountInput.value = billData.amount;
                }

                if (paidCheckbox) {
                    paidCheckbox.checked = billData.paid;
                }

                if (billData.paid) {
                    card.style.backgroundColor = "#e6f4ea";
                } else {
                    card.style.backgroundColor = "#ffffff";
                }
            });

            calculateTotals();
        }

        // --- FUNKCJE GLOBALNE ---

        window.addNewBill = function() {
            const name = newBillNameInput.value.trim();
            if (!name) return;
            if (globalRegisteredBills.includes(name)) {
                alert("Taki rachunek już istnieje!");
                return;
            }
            globalRegisteredBills.push(name);
            set(ref(db, 'registered_bills'), globalRegisteredBills);
            newBillNameInput.value = '';
        }

        function updateBillName(index, oldName, newName) {
            const cleanedNewName = newName.trim();
            if (!cleanedNewName || cleanedNewName === oldName) {
                rebuildGridStructure();
                return;
            }

            if (globalRegisteredBills.includes(cleanedNewName)) {
                alert("Rachunek o takiej nazwie już istnieje!");
                rebuildGridStructure();
                return;
            }

            const oldId = createBillId(oldName);
            const newId = createBillId(cleanedNewName);

            if (currentMonthData[oldId]) {
                set(ref(db, `months_data/${monthSelect.value}/${newId}`), currentMonthData[oldId]);
                set(ref(db, `months_data/${monthSelect.value}/${oldId}`), null);
            }

            globalRegisteredBills[index] = cleanedNewName;
            set(ref(db, 'registered_bills'), globalRegisteredBills);
        }

        // ZMIANA LOGIKI: Usuwanie tylko z bieżącego miesiąca
        function removeBillFromCurrentMonth(name) {
            const billId = createBillId(name);
            if (confirm(`Czy usunąć rachunek "${name}" TYLKO z wybranego miesiąca?`)) {
                // Zapisujemy flagę status: 'removed' w strukturze wybranego miesiąca
                update(ref(db, `months_data/${monthSelect.value}/${billId}`), {
                    status: 'removed',
                    amount: 0, // zerujemy kwotę przy usunięciu z widoku, żeby nie zaburzać sumy
                    paid: false
                });
            }
        }

        function updateAmount(billId, value) {
            update(ref(db, `months_data/${monthSelect.value}/${billId}`), {
                amount: value
            });
        }

        function togglePaid(billId, isChecked) {
            update(ref(db, `months_data/${monthSelect.value}/${billId}`), {
                paid: isChecked
            });
        }

        monthSelect.addEventListener('change', () => {
            listenToMonthData();
        });
        
        newBillNameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addNewBill(); });

        listenToMonthData();
    });
</script>
