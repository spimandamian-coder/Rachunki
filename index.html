<!-- Import skryptów Firebase z sieci (wersja modułowa) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ----------------------------------------------------
    // OBIEKT CONFIG Z FIREBASE:
    const firebaseConfig = {
        apiKey: "AIzaSyB4XJj7CMAfeLaWgSPAb-QOW7AmzCuOIjg",
        authDomain: "rachunki-realtime.firebaseapp.com",
        databaseURL: "https://rachunki-realtime-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rachunki-realtime",
        storageBucket: "rachunki-realtime.firebasestorage.app",
        messagingSenderId: "1024588826825",
        appId: "1:1024588826825:web:bcba5bb7172aaf9eafa518",
        measurementId: "G-FLVENSC5TG"
    };
    // ----------------------------------------------------

    // Inicjalizacja Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const defaultBills = [
        "Internet Play", "Woda Tuwima", "Czynsz Tuwima", "Czynsz Armii",
        "Fundusz Remontowy", "Gaz Tuwima", "Gaz Armii", "Prad Tuwima",
        "Prad Armii", "Prad dzialka", "Treninigi", "Obiady"
    ];

    const months = [
        "Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec",
        "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"
    ];

    const monthSelect = document.getElementById('monthSelect');
    const billsGrid = document.getElementById('billsGrid');
    const newBillNameInput = document.getElementById('newBillName');

    // 1. POPRAWKA: Dynamiczne generowanie lat (Poprzedni, Bieżący, Kolejny - w tym 2027)
    const currentYear = new Date().getFullYear();
    const yearsToGenerate = [currentYear - 1, currentYear, currentYear + 1]; // Generuje np. 2025, 2026, 2027

    yearsToGenerate.forEach(year => {
        months.forEach((month, index) => {
            let option = document.createElement('option');
            option.value = `${year}-${index}`;
            option.textContent = `${month} ${year}`;
            monthSelect.appendChild(option);
        });
    });
    // Ustawienie domyślnego zaznaczenia na obecny miesiąc i rok
    monthSelect.value = `${currentYear}-${new Date().getMonth()}`;

    let globalRegisteredBills = [];
    let currentMonthData = {};

    // --- SYNCHRONIZACJA Z BAZĄ W CZASIE RZECZYWISTYM ---

    // Słuchaj zmian na liście nazw rachunków
    const billsListRef = ref(db, 'registered_bills');
    onValue(billsListRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            globalRegisteredBills = data;
        } else {
            globalRegisteredBills = defaultBills;
            set(billsListRef, defaultBills);
        }
        rebuildGridStructure(); 
    });

    // Słuchaj zmian dla wybranego miesiąca
    function listenToMonthData() {
        const monthDataRef = ref(db, `months_data/${monthSelect.value}`);
        
        onValue(monthDataRef, (snapshot) => {
            currentMonthData = snapshot.val() || {};
            updateLiveValues(); 
        });
    }

    // Budowanie struktury – wywoływane przy zmianie struktury listy lub zmianie miesiąca
    function rebuildGridStructure() {
        billsGrid.innerHTML = '';
        
        globalRegisteredBills.forEach((name, index) => {
            const billId = encodeURIComponent(name.toLowerCase().replace(/\s+/g, '_'));
            
            const card = document.createElement('div');
            card.className = `bill-card`;
            card.id = `card-${billId}`;

            // 2. POPRAWKA: Zamiana nagłówka h3 na pole tekstowe (input) do edycji nazwy na żywo
            card.innerHTML = `
                <button class="delete-btn" data-name="${name}">×</button>
                <div class="input-group" style="margin-bottom: 15px;">
                    <label>Nazwa opłaty:</label>
                    <input type="text" class="name-input" data-index="${index}" value="${name}" style="font-weight: bold; font-size: 16px; border: none; background: transparent; padding: 0; border-bottom: 1px dashed #ccc; border-radius: 0;">
                </div>
                <div class="input-group">
                    <label>Kwota (zł):</label>
                    <input type="number" step="0.01" class="amount-input" data-id="${billId}" placeholder="0.00">
                </div>
                <label class="checkbox-group">
                    <input type="checkbox" class="paid-checkbox" data-id="${billId}">
                    Opłacone
                </label>
            `;

            // Rejestracja zdarzeń
            card.querySelector('.delete-btn').addEventListener('click', () => removeBill(name));
            card.querySelector('.amount-input').addEventListener('input', (e) => updateAmount(billId, e.target.value));
            card.querySelector('.paid-checkbox').addEventListener('change', (e) => togglePaid(billId, e.target.checked));
            
            // Nasłuchiwanie zmiany nazwy rachunku
            const nameInput = card.querySelector('.name-input');
            nameInput.addEventListener('change', (e) => updateBillName(index, name, e.target.value));

            billsGrid.appendChild(card);
        });
        
        updateLiveValues();
    }

    // Aktualizacja wartości pól bez niszczenia DOM
    function updateLiveValues() {
        globalRegisteredBills.forEach(name => {
            const billId = encodeURIComponent(name.toLowerCase().replace(/\s+/g, '_'));
            const billData = currentMonthData[billId] || { amount: '', paid: false };
            
            const card = document.getElementById(`card-${billId}`);
            if (!card) return;

            const nameInput = card.querySelector('.name-input');
            const amountInput = card.querySelector('.amount-input');
            const paidCheckbox = card.querySelector('.paid-checkbox');

            // Synchronizuj nazwę, jeśli użytkownik akurat jej nie edytuje
            if (document.activeElement !== nameInput && nameInput) {
                nameInput.value = name;
            }

            // Synchronizuj kwotę
            if (document.activeElement !== amountInput) {
                amountInput.value = billData.amount;
            }

            // Synchronizuj status opłacenia
            paidCheckbox.checked = billData.paid;

            if (billData.paid) {
                card.classList.add('paid');
            } else {
                card.classList.remove('paid');
            }
        });
    }

    // --- FUNKCJE BAZODANOWE ---

    window.addNewBill = function() {
        const name = newBillNameInput.value.trim();
        if (!name) return;
        if (globalRegisteredBills.includes(name)) {
            alert("Taki rachunek już istnieje!");
            return;
        }
        globalRegisteredBills.push(name);
        set(ref(db, 'registered_bills'), globalRegisteredBills);
        newBillNameInput.value = '';
    }

    // Nowa funkcja: Zmiana nazwy rachunku na liście globalnej
    function updateBillName(index, oldName, newName) {
        const cleanedNewName = newName.trim();
        if (!cleanedNewName || cleanedNewName === oldName) return;

        if (globalRegisteredBills.includes(cleanedNewName)) {
            alert("Rachunek o takiej nazwie już istnieje!");
            rebuildGridStructure(); // przywraca starą nazwę w widoku
            return;
        }

        // Aktualizuj pozycję w tablicy i wyślij do Firebase
        globalRegisteredBills[index] = cleanedNewName;
        set(ref(db, 'registered_bills'), globalRegisteredBills);
        
        // Uwaga: Dane kwot przypisane do starego identyfikatora (starej nazwy) w miesiącach 
        // pozostaną w bazie, ale nowy identyfikator zacznie zbierać nowe wpisy.
    }

    function removeBill(name) {
        if (confirm(`Czy usunąć "${name}" ze wszystkich miesięcy?`)) {
            const updatedList = globalRegisteredBills.filter(b => b !== name);
            set(ref(db, 'registered_bills'), updatedList);
        }
    }

    function updateAmount(billId, value) {
        update(ref(db, `months_data/${monthSelect.value}/${billId}`), {
            amount: value
        });
    }

    function togglePaid(billId, isChecked) {
        update(ref(db, `months_data/${monthSelect.value}/${billId}`), {
            paid: isChecked
        });
    }

    monthSelect.addEventListener('change', () => {
        listenToMonthData();
    });
    
    newBillNameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addNewBill(); });

    // Start aplikacji
    listenToMonthData();
</script>
