<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Rachunki - Dashboard</title>
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --bg-card: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --border-color: #dee2e6;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
            --modal-overlay: rgba(0, 0, 0, 0.4);
        }
        [data-theme="dark"] {
            --bg-primary: #121212;
            --bg-card: #1e1e1e;
            --text-main: #f8f9fa;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
            --modal-overlay: rgba(0, 0, 0, 0.7);
        }
        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .header-zone {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .dashboard-box {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
        }
        .bill-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 20px;
            position: relative;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s;
        }
        .bill-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
        }
        .btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .input-style {
            padding: 10px;
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
        }
        .chart-container {
            position: relative;
            width: 120px;
            height: 120px;
        }
        
        /* STYLE DLA OKNA MODALNEGO LOGÓW */
        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--modal-overlay);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 90%;
            max-width: 650px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            animation: fadeIn 0.2s ease-out;
        }
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
        }
        .log-item {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            line-height: 1.4;
        }
        .log-item:last-child { border-bottom: none; }
        .log-time {
            font-weight: 600;
            color: var(--text-muted);
            margin-right: 10px;
            font-family: monospace;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="mainContent" class="container">
    <div class="header-zone">
        <h1 style="margin: 0; font-weight: 700; font-size: 28px;">🎛️ FinanseDomowe</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button id="statsBtn" class="btn btn-primary" style="background-color: #28a745; display: inline-flex; align-items: center; gap: 5px;">📊 Statystyki</button>
            
            <span id="lockStatus" style="font-size: 13px; font-weight: 600; color: #6c757d; background: var(--bg-card); padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border-color);">🔒 Tylko podgląd</span>
            <button id="themeToggle" class="btn btn-secondary" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-main); font-size: 20px; padding: 5px 12px;">🌙</button>
        </div>
    </div>
    
    <div class="dashboard-box">
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <div style="display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;">
                <div>
                    <label for="monthSelect" style="font-weight: 600; font-size: 14px; display: block; margin-bottom: 5px; color: var(--text-muted);">WYBIERZ MIESIĄC</label>
                    <select id="monthSelect" class="input-style" style="font-size: 16px; font-weight: 600; width: 200px;"></select>
                </div>
                <button id="openLogsBtn" class="btn btn-secondary" style="background-color: #6f42c1; color: white; padding: 10px 15px;">📜 Historia zmian</button>
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button id="copyPrevMonthBtn" class="btn btn-secondary" style="font-size: 12px; padding: 6px 12px; background-color: transparent; border: 1px solid #007bff; color: #007bff;">📋 Kopiuj kwoty z poprz. miesiąca</button>
                <button id="clearMonthBtn" class="btn btn-secondary" style="font-size: 12px; padding: 6px 12px; background-color: transparent; border: 1px solid #c62828; color: #c62828;">🗑️ Wyczyść aktualny miesiąc</button>
            </div>
        </div>
        
        <div style="display: flex; gap: 40px; flex-wrap: wrap;">
            <div style="display: flex; flex-direction: column; justify-content: center;">
                <span style="font-size: 13px; color: var(--text-muted); font-weight: 600;">OPŁACONE</span>
                <span style="color: #2e7d32; font-size: 24px; font-weight: 700;"><span id="totalPaid">0.00</span> zł</span>
            </div>
            <div style="display: flex; flex-direction: column; justify-content: center;">
                <span style="font-size: 13px; color: var(--text-muted); font-weight: 600;">DO ZAPŁATY</span>
                <span style="color: #c62828; font-size: 24px; font-weight: 700;"><span id="totalUnpaid">0.00</span> zł</span>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="miniChart" width="120" height="120"></canvas>
        </div>
    </div>

    <div style="margin-bottom: 30px; display: flex; gap: 10px; flex-wrap: wrap;">
        <input type="text" id="newBillName" placeholder="Nazwa nowego rachunku np. Prąd Armii..." class="input-style" style="width: 300px; font-size: 15px;">
        <button onclick="window.addNewBill()" class="btn btn-primary">➕ Dodaj rachunek</button>
    </div>

    <div id="billsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;"></div>
</div>

<div id="logsModal" class="modal-backdrop">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="margin: 0; font-size: 20px; font-weight: 700;">📜 Pełna historia operacji</h2>
            <button id="closeLogsBtn" style="background: none; border: none; font-size: 28px; cursor: pointer; color: var(--text-main); line-height: 1;">&times;</button>
        </div>
        <div id="modalLogBody" class="modal-body">
            <div style="text-align: center; color: var(--text-muted);">Ładowanie historii logów...</div>
        </div>
    </div>
</div>

<script>
    const CORRECT_PIN = "6969"; // Twój kod PIN
    window.isAppUnlocked = false; // Status uprawnień do edycji

    // Funkcja sprawdzająca uprawnienia przed wykonaniem jakiejkolwiek akcji zapisu/edycji
    function checkPermission() {
        if (window.isAppUnlocked) return true;
        
        const pin = prompt("🔐 Ta akcja wymaga autoryzacji. Wprowadź kod PIN:");
        if (pin === CORRECT_PIN) {
            window.isAppUnlocked = true;
            const statusEl = document.getElementById('lockStatus');
            if (statusEl) {
                statusEl.textContent = "🔓 Edycja włączona";
                statusEl.style.color = "#2e7d32";
                statusEl.style.borderColor = "#2e7d32";
            }
            return true;
        } else if (pin !== null) {
            alert("❌ Niepoprawny kod PIN! Działanie zostało zablokowane.");
        }
        return false;
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4XJj7CMAfeLaWgSPAb-QOW7AmzCuOIjg",
        authDomain: "rachunki-realtime.firebaseapp.com",
        databaseURL: "https://rachunki-realtime-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rachunki-realtime",
        storageBucket: "rachunki-realtime.firebasestorage.app",
        messagingSenderId: "1024588826825",
        appId: "1:1024588826825:web:bcba5bb7172aaf9eafa518",
        measurementId: "G-FLVENSC5TG"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const defaultBills = [
        "Internet Play", "Woda Tuwima", "Czynsz Tuwima", "Czynsz Armii",
        "Fundusz Remontowy", "Gaz Tuwima", "Gaz Armii", "Prad Tuwima",
        "Prad Armii", "Prad dzialka", "Treninigi", "Obiady"
    ];

    const months = [
        "Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec",
        "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"
    ];

    function getBillIcon(name) {
        const lower = name.toLowerCase();
        if (lower.includes('prad') || lower.includes('energia')) return '⚡';
        if (lower.includes('gaz')) return '🔥';
        if (lower.includes('czynsz') || lower.includes('fundusz')) return '🏠';
        if (lower.includes('woda')) return '💧';
        if (lower.includes('internet') || lower.includes('play') || lower.includes('net')) return '🌐';
        if (lower.includes('trening') || lower.includes('obiad') || lower.includes('natan')) return '⚽';
        return '📄';
    }

    document.addEventListener("DOMContentLoaded", () => {
        const monthSelect = document.getElementById('monthSelect');
        const billsGrid = document.getElementById('billsGrid');
        const newBillNameInput = document.getElementById('newBillName');
        const totalPaidSpan = document.getElementById('totalPaid');
        const totalUnpaidSpan = document.getElementById('totalUnpaid');
        const themeToggle = document.getElementById('themeToggle');
        const copyPrevMonthBtn = document.getElementById('copyPrevMonthBtn');
        const clearMonthBtn = document.getElementById('clearMonthBtn');
        const canvas = document.getElementById('miniChart');
        const ctx = canvas.getContext('2d');
        
        let debounceTimer;

        // --- ZAKTUALIZOWANA OBSŁUGA MOTYWU (ZAPIS I ODCZYT Z LOCALSTORAGE) ---
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            drawChart(parseFloat(totalPaidSpan.textContent) || 0, parseFloat(totalUnpaidSpan.textContent) || 0);
        });
        // --- KONIEC ZMIAN W MOTYWIE ---

        const currentYear = new Date().getFullYear();
        const yearsToGenerate = [currentYear, currentYear + 1];

        yearsToGenerate.forEach(year => {
            months.forEach((month, index) => {
                let option = document.createElement('option');
                option.value = `${year}-${index}`;
                option.textContent = `${month} ${year}`;
                monthSelect.appendChild(option);
            });
        });
        
        monthSelect.value = `${currentYear}-${new Date().getMonth()}`;

        let globalRegisteredBills = [];
        let currentMonthData = null;

        function createBillId(name) {
            return encodeURIComponent(name.toLowerCase().trim().replace(/\s+/g, '_'));
        }

        function getFriendlyMonthName(monthValue) {
            const parts = monthValue.split('-');
            return `${months[parseInt(parts[1])]} ${parts[0]}`;
        }

        function logEvent(message) {
            const logsRef = ref(db, 'operation_logs');
            const now = new Date();
            const timestamp = now.toLocaleDateString('pl-PL') + ' ' + now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            push(logsRef, {
                timestamp: timestamp,
                message: message
            });
        }

        const billsListRef = ref(db, 'registered_bills');
        onValue(billsListRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                globalRegisteredBills = data;
            } else {
                globalRegisteredBills = defaultBills;
                set(billsListRef, defaultBills);
            }
            rebuildGridStructure(); 
        });

        function listenToMonthData() {
            const monthDataRef = ref(db, `months_data/${monthSelect.value}`);
            onValue(monthDataRef, (snapshot) => {
                currentMonthData = snapshot.val();
                rebuildGridStructure();
            });
        }

        function drawChart(paid, unpaid) {
            if (!canvas || !ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const total = paid + unpaid;
            if (total === 0) {
                ctx.beginPath();
                ctx.arc(60, 60, 50, 0, 2 * Math.PI);
                ctx.fillStyle = '#cccccc';
                ctx.fill();
                return;
            }

            const paidAngle = (paid / total) * 2 * Math.PI;

            ctx.beginPath();
            ctx.moveTo(60, 60);
            ctx.arc(60, 60, 55, 0, paidAngle);
            ctx.fillStyle = '#2e7d32';
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(60, 60);
            ctx.arc(60, 60, 55, paidAngle, 2 * Math.PI);
            ctx.fillStyle = '#c62828';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(60, 60, 38, 0, 2 * Math.PI);
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            ctx.fillStyle = isDark ? '#1e1e1e' : '#ffffff';
            ctx.fill();
        }

        function rebuildGridStructure() {
            const activeElementId = document.activeElement ? document.activeElement.id : null;
            const selectionStart = document.activeElement ? document.activeElement.selectionStart : null;
            const selectionEnd = document.activeElement ? document.activeElement.selectionEnd : null;

            billsGrid.innerHTML = '';
            
            if (!currentMonthData) {
                updateLiveValues();
                return;
            }

            Object.keys(currentMonthData).forEach((billId) => {
                const billData = currentMonthData[billId];
                if (!billData || billData.status === 'removed') return;

                let name = globalRegisteredBills.find(n => createBillId(n) === billId) || decodeURIComponent(billId).replace(/_/g, ' ');
                name = name.charAt(0).toUpperCase() + name.slice(1);

                const icon = getBillIcon(name);
                const card = document.createElement('div');
                card.className = `bill-card`;
                card.id = `card-${billId}`;
                card.style.border = "1px solid var(--border-color)";

                card.innerHTML = `
                    <button class="delete-btn" style="position: absolute; top: 12px; right: 15px; background: none; border: none; font-size: 22px; cursor: pointer; color: #c62828; opacity: 0.6;">×</button>
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
                        <span style="font-size: 24px;">${icon}</span>
                        <input type="text" id="name-${billId}" class="name-input" value="${name}" style="font-weight: 600; font-size: 16px; border: none; background: transparent; color: var(--text-main); border-bottom: 1px dashed var(--border-color); width: 100%; padding-bottom: 2px;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display:block; margin-bottom:5px; font-size: 12px; color: var(--text-muted); font-weight: 600;">KWOTA DO ZAPŁATY</label>
                        <input type="number" step="0.01" id="amount-${billId}" class="amount-input" placeholder="0.00" style="padding: 8px; width: 85%; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-main);"> <span style="font-weight: 600;">zł</span>
                    </div>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600; font-size: 14px;">
                        <input type="checkbox" id="check-${billId}" class="paid-checkbox" style="width: 18px; height: 18px; cursor: pointer;">
                        Oznacz jako opłacony
                    </label>
                `;

                // BLOKADA USUWANIA PINEM
                card.querySelector('.delete-btn').addEventListener('click', () => {
                    if (checkPermission()) removeBillFromCurrentMonth(name);
                });
                
                // BLOKADA ZMIANY KWOTY PINEM
                card.querySelector('.amount-input').addEventListener('input', (e) => {
                    const oldVal = billData.amount || '0.00';
                    const newVal = e.target.value;
                    
                    if (!checkPermission()) {
                        e.target.value = oldVal; // Cofnij zmianę w polu tekstowym
                        return;
                    }

                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => {
                        updateAmount(billId, newVal);
                        logEvent(`[${getFriendlyMonthName(monthSelect.value)}] Zmieniono kwotę rachunku "${name}" z ${oldVal} zł na ${newVal || '0.00'} zł`);
                    }, 500); 
                });

                // BLOKADA CHECKBOXA PINEM
                card.querySelector('.paid-checkbox').addEventListener('click', (e) => {
                    if (!checkPermission()) {
                        e.preventDefault();
                        return;
                    }
                });

                card.querySelector('.paid-checkbox').addEventListener('change', (e) => {
                    togglePaid(billId, e.target.checked);
                    logEvent(`[${getFriendlyMonthName(monthSelect.value)}] Oznaczono rachunek "${name}" jako ${e.target.checked ? 'OPŁACONY' : 'NIEOPŁACONY'}`);
                });
                
                // BLOKADA ZMIANY NAZWY PINEM
                card.querySelector('.name-input').addEventListener('change', (e) => {
                    if (!checkPermission()) {
                        e.target.value = name; // Cofnij zmianę wizualną
                        return;
                    }
                    const idx = globalRegisteredBills.findIndex(n => createBillId(n) === billId);
                    updateBillName(idx >= 0 ? idx : globalRegisteredBills.length, name, e.target.value);
                });

                billsGrid.appendChild(card);
            });
            
            updateLiveValues();

            if (activeElementId) {
                const elementToFocus = document.getElementById(activeElementId);
                if (elementToFocus) {
                    elementToFocus.focus();
                    if (selectionStart !== null && (elementToFocus.type === 'text' || elementToFocus.type === 'search')) {
                        elementToFocus.setSelectionRange(selectionStart, selectionEnd);
                    }
                }
            }
        }

        function calculateTotals() {
            let paidSum = 0;
            let unpaidSum = 0;

            if (!currentMonthData) {
                totalPaidSpan.textContent = "0.00";
                totalUnpaidSpan.textContent = "0.00";
                drawChart(0, 0);
                return;
            }

            Object.keys(currentMonthData).forEach(billId => {
                const billData = currentMonthData[billId];
                if (!billData || billData.status === 'removed') return;
                
                const amount = parseFloat(billData.amount) || 0;
                if (billData.paid) paidSum += amount;
                else unpaidSum += amount;
            });

            totalPaidSpan.textContent = paidSum.toFixed(2);
            totalUnpaidSpan.textContent = unpaidSum.toFixed(2);
            
            drawChart(paidSum, unpaidSum);
        }

        function updateLiveValues() {
            if (!currentMonthData) {
                calculateTotals();
                return;
            }

            Object.keys(currentMonthData).forEach(billId => {
                const billData = currentMonthData[billId];
                if (!billData || billData.status === 'removed') return;

                const card = document.getElementById(`card-${billId}`);
                if (!card) return;

                const nameInput = card.querySelector('.name-input');
                const amountInput = card.querySelector('.amount-input');
                const paidCheckbox = card.querySelector('.paid-checkbox');

                let name = globalRegisteredBills.find(n => createBillId(n) === billId) || decodeURIComponent(billId).replace(/_/g, ' ');
                name = name.charAt(0).toUpperCase() + name.slice(1);

                if (document.activeElement !== nameInput && nameInput) nameInput.value = name;
                if (document.activeElement !== amountInput && amountInput) amountInput.value = billData.amount;
                if (paidCheckbox) paidCheckbox.checked = billData.paid;

                if (billData.paid) {
                    card.style.backgroundColor = "rgba(46, 125, 50, 0.12)";
                    card.style.borderColor = "#2e7d32";
                } else {
                    card.style.backgroundColor = "var(--bg-card)";
                    card.style.borderColor = "var(--border-color)";
                }
            });

            calculateTotals();
        }

        // KOPIRZ MIESIĄC Z BLOKADĄ PIN
        copyPrevMonthBtn.addEventListener('click', async () => {
            if (!checkPermission()) return;
            
            const currentVal = monthSelect.value;
            const parts = currentVal.split('-');
            let year = parseInt(parts[0]);
            let monthIdx = parseInt(parts[1]);

            if (monthIdx === 0) {
                monthIdx = 11;
                year -= 1;
            } else {
                monthIdx -= 1;
            }

            const prevMonthKey = `${year}-${monthIdx}`;
            if (confirm(`Czy chcesz skopiować wszystkie kafelki, nazwy oraz kwoty z miasta ${months[monthIdx]} ${year}?`)) {
                const prevMonthRef = ref(db, `months_data/${prevMonthKey}`);
                const snapshot = await get(prevMonthRef);
                if (snapshot.exists()) {
                    const prevData = snapshot.val();
                    await set(ref(db, `months_data/${currentVal}`), prevData);
                    logEvent(`[${getFriendlyMonthName(currentVal)}] Skopiowano strukturę i kwoty z miesiąca ${months[monthIdx]} ${year}`);
                    alert("Dane miesiąca zostały pomyślnie skopiowane!");
                } else {
                    alert("Nie znaleziono danych z poprzedniego miesiąca do skopiowania.");
                }
            }
        });

        // CZYSZCZENIE MIESIĄCA Z BLOKADĄ PIN
        clearMonthBtn.addEventListener('click', async () => {
            if (!checkPermission()) return;
            
            const currentVal = monthSelect.value;
            if (confirm(`⚠️ CZY NA PEWNO CHCESZ WYCZYŚCIĆ CAŁY MIESIĄC?\n\nSpowoduje to całkowite USUNIĘCIE WSZYSTKICH KAFELKÓW (nazw i kwot) w miesiącu: ${getFriendlyMonthName(currentVal)}.\nEkran będzie całkowicie pusty.`)) {
                const monthDataRef = ref(db, `months_data/${currentVal}`);
                await set(monthDataRef, null); 
                logEvent(`[${getFriendlyMonthName(currentVal)}] Całkowicie wyczyszczono miesiąc (usunięto wszystkie kafelki)`);
                alert("Miesiąc został całkowicie wyczyszczony!");
            }
        });

        // DODAWANIE Z BLOKADĄ PIN
        window.addNewBill = function() {
            if (!checkPermission()) return;

            const name = newBillNameInput.value.trim();
            if (!name) return;
            
            const billId = createBillId(name);

            if (!globalRegisteredBills.includes(name)) {
                globalRegisteredBills.push(name);
                set(ref(db, 'registered_bills'), globalRegisteredBills);
            }

            update(ref(db, `months_data/${monthSelect.value}/${billId}`), {
                status: 'active',
                amount: '',
                paid: false
            });
            
            logEvent(`[${getFriendlyMonthName(monthSelect.value)}] Dodano nowy rachunek: "${name}"`);
            newBillNameInput.value = '';
        }

        function updateBillName(index, oldName, newName) {
            const cleanedNewName = newName.trim();
            if (!cleanedNewName || cleanedNewName === oldName) {
                rebuildGridStructure();
                return;
            }
            
            const oldId = createBillId(oldName);
            const newId = createBillId(cleanedNewName);

            if (currentMonthData && currentMonthData[oldId]) {
                set(ref(db, `months_data/${monthSelect.value}/${newId}`), currentMonthData[oldId]);
                set(ref(db, `months_data/${monthSelect.value}/${oldId}`), null);
            }
            
            if (index < globalRegisteredBills.length) {
                globalRegisteredBills[index] = cleanedNewName;
                set(ref(db, 'registered_bills'), globalRegisteredBills);
            }
            logEvent(`Zmieniono nazwę szablonu rachunku z "${oldName}" na "${cleanedNewName}"`);
        }

        function removeBillFromCurrentMonth(name) {
            const billId = createBillId(name);
            if (confirm(`Czy usunąć rachunek "${name}" TYLKO z wybranego miasta?`)) {
                set(ref(db, `months_data/${monthSelect.value}/${billId}`), null);
                logEvent(`[${getFriendlyMonthName(monthSelect.value)}] Usunięto kafelek rachunku: "${name}"`);
            }
        }

        function updateAmount(billId, value) {
            update(ref(db, `months_data/${monthSelect.value}/${billId}`), {
                amount: value
            });
        }

        function togglePaid(billId, isChecked) {
            update(ref(db, `months_data/${monthSelect.value}/${billId}`), {
                paid: isChecked
            });
        }

        openLogsBtn.addEventListener('click', () => {
            logsModal.style.display = 'flex';
            modalLogBody.innerHTML = '<div style="text-align: center; color: var(--text-muted);">Pobieranie historii z bazy...</div>';
            
            const logsRef = ref(db, 'operation_logs');
            get(logsRef).then((snapshot) => {
                modalLogBody.innerHTML = '';
                const data = snapshot.val();
                
                if (!data) {
                    modalLogBody.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 20px;">Brak wpisów w historii.</div>';
                    return;
                }
                
                const logsList = Object.keys(data).map(key => data[key]).reverse();
                
                logsList.forEach(log => {
                    const logRow = document.createElement('div');
                    logRow.className = 'log-item';
                    logRow.innerHTML = `<span class="log-time">[${log.timestamp}]</span> <span class="log-msg">${log.message}</span>`;
                    modalLogBody.appendChild(logRow);
                });
            }).catch(err => {
                modalLogBody.innerHTML = `<div style="text-align: center; color: #c62828; padding: 20px;">Błąd pobierania logów: ${err.message}</div>`;
            });
        });

        closeLogsBtn.addEventListener('click', () => logsModal.style.display = 'none');
        window.addEventListener('click', (e) => { if (e.target === logsModal) logsModal.style.display = 'none'; });

        monthSelect.addEventListener('change', () => {
            listenToMonthData();
        });
        
        newBillNameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addNewBill(); });

        // --- DODANA BLOKADA PRZYCISKU STATYSTYK PINEM ---
        const statsBtn = document.getElementById('statsBtn');
        if (statsBtn) {
            statsBtn.addEventListener('click', () => {
                if (window.checkPermission()) {
                    window.location.href = 'statystyki.html';
                }
            });
        }

        listenToMonthData();
    });
</script>
</body>
</html>
