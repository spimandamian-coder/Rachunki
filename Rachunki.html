<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menedżer Rachunków</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --unpaid-color: #ffebee;
            --unpaid-border: #ef5350;
            --paid-color: #e8f5e9;
            --paid-border: #66bb6a;
            --primary-color: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .month-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        select {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        .bills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .bill-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 8px solid var(--unpaid-border);
            background-color: var(--unpaid-color);
            transition: all 0.3s ease;
            position: relative;
        }

        .bill-card.paid {
            border-left-color: var(--paid-border);
            background-color: var(--paid-color);
        }

        .bill-title {
            font-size: 18px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            color: #2c3e50;
            padding-right: 25px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            color: #7f8c8d;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .checkbox-group input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        /* Sekcja dodawania nowego rachunku */
        .add-bill-panel {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 4px solid var(--primary-color);
            margin-top: 20px;
        }

        .add-bill-panel h2 {
            margin-top: 0;
            font-size: 20px;
            color: #2c3e50;
        }

        .add-form {
            display: flex;
            gap: 10px;
        }

        .add-form input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .add-form button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .add-form button:hover {
            background-color: #2980b9;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #bdc3c7;
            font-size: 18px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .delete-btn:hover {
            color: #e74c3c;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Wykaz Rachunków</h1>
        <div class="month-selector">
            <label for="monthSelect">Wybierz miesiąc: </label>
            <select id="monthSelect"></select>
        </div>
    </header>

    <div class="bills-grid" id="billsGrid"></div>

    <div class="add-bill-panel">
        <h2>Dodaj nową opłatę do wykazu</h2>
        <div class="add-form">
            <input type="text" id="newBillName" placeholder="Np. Prąd garaż, Abonament HBO, Ubezpieczenie...">
            <button onclick="addNewBill()">Dodaj opłatę</button>
        </div>
    </div>
</div>

<script>
    // Domyślna lista rachunków (używana tylko przy pierwszym uruchomieniu w historii)
    const defaultBills = [
        "Internet Play", "Woda Tuwima", "Czynsz Tuwima", "Czynsz Armii",
        "Fundusz Remontowy", "Gaz Tuwima", "Gaz Armii", "Prad Tuwima",
        "Prad Armii", "Prad dzialka", "Treninigi", "Obiady"
    ];

    const months = [
        "Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec",
        "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"
    ];

    const monthSelect = document.getElementById('monthSelect');
    const billsGrid = document.getElementById('billsGrid');
    const newBillNameInput = document.getElementById('newBillName');

    // Inicjalizacja listy miesięcy (rok bieżący)
    const currentYear = new Date().getFullYear();
    months.forEach((month, index) => {
        let option = document.createElement('option');
        option.value = `${currentYear}-${index}`;
        option.textContent = `${month} ${currentYear}`;
        monthSelect.appendChild(option);
    });

    // Ustawienie aktualnego miesiąca jako domyślny przy otwarciu
    const currentMonthIndex = new Date().getMonth();
    monthSelect.value = `${currentYear}-${currentMonthIndex}`;

    // --- LOGIKA ZARZĄDZANIA NAZWAMI RACHUNKÓW ---
    function getRegisteredBills() {
        const savedNames = localStorage.getItem('registered_bill_names');
        if (savedNames) {
            return JSON.parse(savedNames);
        } else {
            localStorage.setItem('registered_bill_names', JSON.stringify(defaultBills));
            return defaultBills;
        }
    }

    function saveRegisteredBills(billNamesList) {
        localStorage.setItem('registered_bill_names', JSON.stringify(billNamesList));
    }

    // --- LOGIKA ZARZĄDZANIA DANYMI (KWOTY/STATUSY) DLA DANIEGO MIESIĄCA ---
    function getStorageKey() {
        return `bills_data_${monthSelect.value}`;
    }

    function loadMonthData() {
        const savedData = localStorage.getItem(getStorageKey());
        return savedData ? JSON.parse(savedData) : {};
    }

    function saveMonthData(data) {
        localStorage.setItem(getStorageKey(), JSON.stringify(data));
    }

    // --- RENDEROWANIE WIDOKU ---
    function renderBills() {
        billsGrid.innerHTML = '';
        const billNames = getRegisteredBills();
        const currentMonthData = loadMonthData();

        billNames.forEach(name => {
            // Generowanie unikalnego ID bez spacji i dziwnych znaków
            const billId = encodeURIComponent(name.toLowerCase().replace(/\s+/g, '_'));
            const billData = currentMonthData[billId] || { amount: '', paid: false };

            const card = document.createElement('div');
            card.className = `bill-card ${billData.paid ? 'paid' : ''}`;
            card.id = `card-${billId}`;

            card.innerHTML = `
                <button class="delete-btn" onclick="removeBill('${name}')" title="Usuń ten rachunek z listy całkowicie">×</button>
                <h3 class="bill-title">${name}</h3>
                <div class="input-group">
                    <label>Kwota (zł):</label>
                    <input type="number" step="0.01" value="${billData.amount}" 
                           placeholder="0.00" oninput="updateAmount('${billId}', this.value)">
                </div>
                <label class="checkbox-group">
                    <input type="checkbox" ${billData.paid ? 'checked' : ''} 
                           onchange="togglePaid('${billId}', this.checked)">
                    Opłacone
                </label>
            `;

            billsGrid.appendChild(card);
        });
    }

    // Funkcja dodawania nowego rachunku z formularza na dole
    window.addNewBill = function() {
        const name = newBillNameInput.value.trim();
        if (!name) return;

        let billNames = getRegisteredBills();
        
        // Zabezpieczenie przed dublowaniem nazw
        if (billNames.includes(name)) {
            alert("Taki rachunek już istnieje na liście!");
            return;
        }

        billNames.push(name);
        saveRegisteredBills(billNames);
        
        newBillNameInput.value = ''; // Czyszczenie pola tekstowego
        renderBills(); // Odświeżenie widoku
    }

    // Obsługa dodawania po kliknięciu Enter w polu tekstowym
    newBillNameInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            addNewBill();
        }
    });

    // Funkcja usuwania rachunku całkowicie ze struktury globalnej
    window.removeBill = function(name) {
        if (confirm(`Czy na pewno chcesz usunąć rachunek "${name}" ze wszystkich miesięcy?`)) {
            let billNames = getRegisteredBills();
            billNames = billNames.filter(b => b !== name);
            saveRegisteredBills(billNames);
            renderBills();
        }
    }

    // Aktualizacja kwoty w pamięci podręcznej dla wybranego miesiąca
    window.updateAmount = function(billId, value) {
        let data = loadMonthData();
        if (!data[billId]) data[billId] = { amount: '', paid: false };
        data[billId].amount = value;
        saveMonthData(data);
    }

    // Zmiana statusu opłacenia (kolor czerwony <-> zielony)
    window.togglePaid = function(billId, isChecked) {
        let data = loadMonthData();
        if (!data[billId]) data[billId] = { amount: '', paid: false };
        data[billId].paid = isChecked;
        saveMonthData(data);

        const card = document.getElementById(`card-${billId}`);
        if (isChecked) {
            card.classList.add('paid');
        } else {
            card.classList.remove('paid');
        }
    }

    // Przełączenie miesiąca w rozwijanej liście u góry
    monthSelect.addEventListener('change', renderBills);

    // Pierwsze uruchomienie aplikacji
    renderBills();
</script>

</body>
</html>
